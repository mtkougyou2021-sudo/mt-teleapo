<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MTテレアポ"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>MT興業 テレアポ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;background:#1a1a1a;font-family:-apple-system,'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo',sans-serif;color:#e2e8f0;overflow:hidden;}
button{cursor:pointer;font-family:inherit;touch-action:manipulation;-webkit-appearance:none;}
input,select,textarea{font-family:inherit;color:#e2e8f0;background:#2a2a2a;border:1.5px solid #f9731644;border-radius:8px;padding:12px 14px;font-size:16px;outline:none;width:100%;box-sizing:border-box;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:#f97316;}
select option{background:#2a2a2a;}
textarea{resize:vertical;}
input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(0.7);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#1a1a1a;}
::-webkit-scrollbar-thumb{background:#f9731666;border-radius:2px;}

#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
#main{flex:1;display:flex;overflow:hidden;}
#list-panel{display:flex;flex-direction:column;width:100%;overflow:hidden;background:#1a1a1a;}
#detail-panel{display:none;flex-direction:column;flex:1;overflow:hidden;background:#1a1a1a;}

@media(min-width:768px){
  #list-panel{width:420px;flex-shrink:0;border-right:1px solid #f9731633;}
  #detail-panel{display:flex;}
  #back-btn{display:none!important;}
}

.panel-header{background:#222;padding:14px 16px 12px;border-bottom:2px solid #f97316;flex-shrink:0;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.logo{font-size:20px;font-weight:900;letter-spacing:0.08em;color:#fff;}
.logo span{color:#f97316;}
.logo small{color:#999;font-size:12px;font-weight:400;margin-left:8px;}
.header-btns{display:flex;gap:8px;align-items:center;}
.sync-indicator{font-size:11px;padding:4px 8px;border-radius:5px;font-weight:700;white-space:nowrap;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.stat-card{background:#2a2a2a;border:1px solid #f9731633;border-radius:8px;padding:7px 4px;text-align:center;}
.stat-num{font-size:17px;font-weight:900;line-height:1;}
.stat-label{color:#fff;font-size:9px;margin-top:2px;font-weight:600;}
.search-wrap{position:relative;}
.filter-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:#f97316;border:none;border-radius:5px;padding:6px 10px;color:#fff;font-size:11px;min-height:32px;}
.filter-toggle.active{background:#ea580c;}
.filters{display:none;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.filters.open{display:grid;}
.filters select{padding:10px 12px;font-size:13px;}

#list-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.list-empty{text-align:center;padding:50px 24px;color:#666;}
.list-empty .ei{font-size:44px;margin-bottom:10px;}
.list-empty p{color:#888;font-size:14px;}
.list-empty small{color:#666;font-size:12px;margin-top:6px;display:block;}
.li{background:#222;border-bottom:1px solid #333;border-left:4px solid transparent;padding:14px 16px;cursor:pointer;transition:background 0.1s;min-height:56px;}
.li:active{background:#333;}
.li.active{background:#2a2a2a;}
.li-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.li-name{font-size:15px;font-weight:700;color:#fff;flex:1;padding-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.li-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
.li-meta span{font-size:11px;color:#999;}
.li-meta .ind{color:#f97316;}
.li-appt{color:#f59e0b;font-size:11px;background:#332800;border-radius:4px;padding:3px 8px;display:inline-block;margin-bottom:4px;}
.li-hist{color:#999;font-size:10px;}
.list-footer{padding:5px 14px;background:#222;border-top:1px solid #333;color:#888;font-size:10px;text-align:center;flex-shrink:0;}

.badge{border-radius:5px;padding:2px 7px;font-size:10px;font-weight:800;white-space:nowrap;border-width:1.5px;border-style:solid;}
.badge.big{padding:5px 12px;font-size:12px;}

.detail-header{background:#222;border-bottom:2px solid #f97316;padding:14px 18px;flex-shrink:0;}
.d-name{font-size:17px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:6px;color:#fff;}
.d-top-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.d-btns{display:flex;gap:8px;flex-shrink:0;}
.call-btn{width:100%;border:none;border-radius:12px;padding:18px;font-size:18px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;letter-spacing:0.04em;background:linear-gradient(135deg,#15803d,#22c55e);color:#fff;box-shadow:0 4px 20px #22c55e33;min-height:60px;}
.call-btn:active{transform:scale(0.97);opacity:0.9;}
.log-btn{width:100%;margin-top:8px;background:#2a2a2a;color:#f97316;border:1.5px solid #f9731666;border-radius:10px;padding:14px;font-size:14px;font-weight:700;min-height:48px;}
.log-btn:active{background:#333;}
.tabs{display:flex;background:#222;border-bottom:1px solid #333;flex-shrink:0;}
.tab-btn{flex:1;padding:14px 8px;background:transparent;color:#888;border:none;border-bottom:2px solid transparent;font-size:13px;font-weight:700;min-height:48px;}
.tab-btn.active{background:#2a2a2a;color:#f97316;border-bottom-color:#f97316;}
.tab-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.info-grid{display:grid;grid-template-columns:1fr;gap:10px;}
@media(min-width:768px){.info-grid{grid-template-columns:1fr 1fr;}}
.ic{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:10px;padding:12px 14px;}
.ic.full{grid-column:1/-1;}
.ic-label{color:#999;font-size:10px;letter-spacing:0.07em;margin-bottom:4px;}
.ic-val{font-size:14px;font-weight:600;color:#fff;}
.ic-val.empty{color:#555;font-weight:400;}
.hc{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:10px;padding:12px 16px;margin-bottom:10px;}
.hc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.hc-date{color:#999;font-size:12px;}
.hc-result{color:#f97316;font-size:12px;font-weight:700;}
.d-ph{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.d-ph .phi{font-size:48px;}
.d-ph p{color:#888;font-size:15px;}

.modal-ov{display:none;position:fixed;inset:0;background:#000000cc;z-index:200;flex-direction:column;justify-content:flex-end;align-items:stretch;}
.modal-ov.open{display:flex;}
@media(min-width:768px){.modal-ov{justify-content:center;align-items:center;} .modal-box{border-radius:14px!important;width:540px!important;max-width:90vw;} .modal-handle{display:none!important;}}
.modal-box{background:#222;border:1px solid #f9731644;border-radius:20px 20px 0 0;padding:24px 20px calc(36px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;width:100%;box-sizing:border-box;-webkit-overflow-scrolling:touch;}
.modal-handle{width:40px;height:4px;background:#555;border-radius:2px;margin:0 auto 18px;}
.modal-title{color:#fff;font-size:15px;font-weight:700;margin-bottom:16px;}
.fg{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:768px){.fg{grid-template-columns:1fr 1fr;}}
.ff{display:flex;flex-direction:column;gap:6px;}
.ff.full{grid-column:1/-1;}
.fl{color:#bbb;font-size:11px;letter-spacing:0.07em;}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.rb{background:#2a2a2a;color:#ccc;border:1.5px solid #f9731644;border-radius:10px;padding:14px 8px;font-size:14px;font-weight:700;min-height:48px;}
.rb:active{opacity:0.8;}
.rb.sel{background:#f97316;color:#fff;border-color:#f97316;}
.sg{display:flex;flex-wrap:wrap;gap:6px;}
.sb{background:#2a2a2a;color:#999;border:1.5px solid #f9731644;border-radius:8px;padding:10px 12px;font-size:13px;font-weight:700;min-height:40px;}
.sb:active{opacity:0.8;}
.ma{display:flex;gap:10px;margin-top:18px;}

.btn{border:none;border-radius:8px;padding:12px 16px;font-size:14px;font-weight:700;min-height:44px;}
.btn:active{opacity:0.85;}
.btn-p{background:linear-gradient(135deg,#ea580c,#f97316);color:#fff;}
.btn-s{background:linear-gradient(135deg,#15803d,#22c55e);color:#fff;}
.btn-csv{background:#f97316;color:#fff;padding:8px 14px;font-size:13px;border:none;border-radius:8px;font-weight:700;min-height:36px;}
.btn-add{background:#15803d;color:#fff;padding:8px 14px;font-size:13px;border:none;border-radius:8px;font-weight:700;min-height:36px;}
.btn-2{background:#333;color:#ccc;border:1px solid #555;}
.btn-e{background:#333;color:#ccc;border:1px solid #555;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;min-height:36px;}
.btn-d{background:#2d0a0a;color:#f87171;border:1px solid #7f1d1d;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;min-height:36px;}
.btn-back{background:#333;color:#ccc;border:1px solid #f9731644;padding:10px 14px;font-size:14px;border-radius:8px;font-weight:700;margin-bottom:12px;min-height:44px;}
.btn-back:active{background:#444;}
.btn-full{width:100%;padding:14px;font-size:15px;}
.btn-gear{background:transparent;border:1px solid #f9731644;border-radius:8px;padding:6px 10px;font-size:16px;min-height:36px;min-width:36px;color:#f97316;}

.loading-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#f97316,#22c55e);z-index:999;transition:width 0.3s;border-radius:0 2px 2px 0;}
</style>
</head>
<body>
<div class="loading-bar" id="loadbar" style="width:0;display:none"></div>
<div id="app">
  <div id="main">
    <div id="list-panel">
      <div class="panel-header">
        <div class="header-top">
          <div class="logo"><span>MT</span>興業<small>テレアポ</small></div>
          <div class="header-btns">
            <span class="sync-indicator" id="sync-ind"></span>
            <button class="btn-csv" onclick="document.getElementById('csv-input').click()">CSV</button>
            <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="handleCSV(this)"/>
            <button class="btn-add" onclick="openAdd()">+ 追加</button>
            <button class="btn-gear" onclick="openM('sm')" title="同期設定">⚙</button>
          </div>
        </div>
        <div class="stats" style="grid-template-columns:1fr 1fr 1fr;">
          <div class="stat-card"><div class="stat-num" id="st" style="color:#fff">0</div><div class="stat-label">総件数</div></div>
          <div class="stat-card"><div class="stat-num" id="sc" style="color:#f97316">0</div><div class="stat-label">架電数</div></div>
          <div class="stat-card"><div class="stat-num" id="sr" style="color:#f97316">0%</div><div class="stat-label">架電率</div></div>
          <div class="stat-card"><div class="stat-num" id="std" style="color:#fbbf24">0</div><div class="stat-label">本日架電</div></div>
          <div class="stat-card"><div class="stat-num" id="sa" style="color:#4ade80">0</div><div class="stat-label">アポ</div></div>
          <div class="stat-card"><div class="stat-num" id="sb2" style="color:#ccc">0</div><div class="stat-label">折返し</div></div>
        </div>
        <div class="search-wrap">
          <input type="text" id="qi" placeholder="会社名 / 住所で検索..." oninput="renderList()" style="padding-right:60px;font-size:14px;"/>
          <button class="filter-toggle" id="ftb" onclick="toggleF()">絞込</button>
        </div>
        <div class="filters" id="filters" style="grid-template-columns:1fr 1fr 1fr;">
          <select id="fa2" onchange="renderList()">
            <option value="">全エリア</option>
            <option value="愛知">愛知</option>
            <option value="三重">三重</option>
            <option value="岐阜">岐阜</option>
          </select>
          <select id="fs" onchange="renderList()">
            <option value="">全ステータス</option>
          </select>
          <select id="fi" onchange="renderList()">
            <option value="">全業種</option>
            <option>外壁塗装</option><option>工務店</option><option>建設業</option>
            <option>ゼネコン</option><option>リフォーム</option><option>設計事務所</option><option>不動産</option><option>その他</option>
          </select>
        </div>
      </div>
      <div id="list-body"></div>
      <div class="list-footer" id="lf">0 / 0 件</div>
    </div>

    <div id="detail-panel">
      <div class="d-ph" id="dph"><div class="phi">📋</div><p>リストから業者を選んでください</p></div>
      <div id="dc" style="display:none;flex-direction:column;height:100%;overflow:hidden;">
        <div class="detail-header">
          <button class="btn-back" id="back-btn" onclick="closeDetail()">← 一覧に戻る</button>
          <div class="d-top-row">
            <div style="flex:1;min-width:0;padding-right:12px;">
              <div class="d-name" id="dn"></div>
              <div id="db"></div>
            </div>
            <div class="d-btns">
              <button class="btn-e" onclick="openEdit()">編集</button>
              <button class="btn-d" onclick="delSel()">削除</button>
            </div>
          </div>
          <button class="call-btn" onclick="doCall()">
            <span style="font-size:24px">📞</span>
            <span>電話をかける</span>
            <span id="dpd" style="font-size:13px;opacity:0.8"></span>
          </button>
          <button class="log-btn" onclick="openLog()">📝 架電結果を記録する</button>
        </div>
        <div class="tabs">
          <button class="tab-btn active" id="tb0" onclick="swTab(0)">📋 案件情報</button>
          <button class="tab-btn" id="tb1" onclick="swTab(1)">📞 履歴</button>
        </div>
        <div class="tab-body" id="t0"></div>
        <div class="tab-body" id="t1" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal-ov" id="fm" onclick="bgClick(event,'fm')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="fmt">+ 新規業者を追加</div>
    <div class="fg">
      <div class="ff full"><label class="fl">会社名 *</label><input type="text" id="fc"/></div>
      <div class="ff full"><label class="fl">住所</label><input type="text" id="fa"/></div>
      <div class="ff"><label class="fl">電話番号 *</label><input type="tel" id="fp" inputmode="tel" pattern="[0-9\-]*" placeholder="例: 03-1234-5678"/></div>
      <div class="ff"><label class="fl">担当者名</label><input type="text" id="fct"/></div>
      <div class="ff"><label class="fl">役職</label><input type="text" id="ftl"/></div>
      <div class="ff">
        <label class="fl">業種</label>
        <select id="fin">
          <option value="">選択してください</option>
          <option>外壁塗装</option><option>工務店</option><option>建設業</option>
          <option>ゼネコン</option><option>リフォーム</option><option>設計事務所</option><option>不動産</option><option>その他</option>
        </select>
      </div>
      <div class="ff full"><label class="fl">次回アポ</label><input type="datetime-local" id="fap"/></div>
      <div class="ff full"><label class="fl">メモ・備考</label><textarea rows="3" id="fmo"></textarea></div>
    </div>
    <div class="ma">
      <button class="btn btn-s btn-full" onclick="saveForm()">保存する</button>
      <button class="btn btn-2" onclick="closeM('fm')" style="padding:14px 18px">キャンセル</button>
    </div>
  </div>
</div>

<!-- LOG MODAL -->
<div class="modal-ov" id="lm" onclick="bgClick(event,'lm')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="lmt">📞 架電記録</div>
    <div style="margin-bottom:14px">
      <div class="fl" style="margin-bottom:8px">架電結果 *</div>
      <div class="rg" id="rb"></div>
    </div>
    <div style="margin-bottom:12px">
      <div class="fl" style="margin-bottom:8px">ステータス更新</div>
      <div class="sg" id="sbg"></div>
    </div>
    <div style="margin-bottom:12px"><label class="fl">担当者名</label><input type="text" id="lcontact" placeholder="対応した担当者名"/></div>
    <div style="margin-bottom:12px"><label class="fl">次回アポ日時</label><input type="datetime-local" id="lap"/></div>
    <div style="margin-bottom:18px">
      <button type="button" onclick="toggleMemo()" style="background:transparent;border:none;color:#475569;font-size:12px;padding:4px 0;cursor:pointer;" id="memo-toggle">+ メモを追加</button>
      <div id="memo-wrap" style="display:none;margin-top:6px;"><textarea rows="2" id="lno" placeholder="メモ（任意）" style="font-size:13px;"></textarea></div>
    </div>
    <div class="ma">
      <button class="btn btn-p btn-full" onclick="saveLog()">保存する</button>
      <button class="btn btn-2" onclick="closeM('lm')" style="padding:14px 18px">キャンセル</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-ov" id="sm" onclick="bgClick(event,'sm')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙ 設定</div>

    <!-- 架電結果カスタマイズ -->
    <div style="margin-bottom:20px;">
      <div class="fl" style="margin-bottom:8px;font-size:13px;color:#e2e8f0;font-weight:700;">架電結果</div>
      <div id="cfg-cr" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;"></div>
      <div style="display:flex;gap:6px;">
        <input type="text" id="new-cr" placeholder="新しい架電結果を追加" style="font-size:13px;flex:1;"/>
        <button class="btn-add" onclick="addCR()" style="white-space:nowrap;">追加</button>
      </div>
    </div>

    <!-- ステータスカスタマイズ -->
    <div style="margin-bottom:20px;">
      <div class="fl" style="margin-bottom:8px;font-size:13px;color:#e2e8f0;font-weight:700;">ステータス</div>
      <div id="cfg-sl" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;"></div>
      <div style="display:flex;gap:6px;">
        <input type="text" id="new-sl" placeholder="新しいステータスを追加" style="font-size:13px;flex:1;"/>
        <button class="btn-add" onclick="addSL()" style="white-space:nowrap;">追加</button>
      </div>
    </div>

    <div style="border-top:1px solid #1a3a6a;padding-top:16px;margin-bottom:16px;">
      <div class="fl" style="margin-bottom:8px;font-size:13px;color:#e2e8f0;font-weight:700;">データ同期</div>
      <div class="ff" style="margin-bottom:12px">
        <label class="fl">GitHubトークン</label>
        <input type="text" id="gh-token" placeholder="ghp_xxxx または gho_xxxx" style="font-size:14px;"/>
      </div>
      <div style="margin-bottom:12px">
        <div id="sync-status" style="color:#475569;font-size:12px;"></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-p" onclick="saveSyncSettings()" style="flex:1;">保存して同期</button>
        <button class="btn" onclick="manualSync()" style="flex:1;background:#0f2040;color:#38bdf8;border:1px solid #1a4a7a;">手動同期</button>
      </div>
    </div>

    <button class="btn btn-2 btn-full" onclick="closeM('sm')">閉じる</button>
  </div>
</div>

<script>
const SK='mt-teleapo-v5';
const GH_REPO='mtkougyou2021-sudo/mt-teleapo';
const GH_FILE='data.json';
const GH_TOKEN_KEY='mt-teleapo-gh-token';

const DEFAULT_SL=[
  {v:'未対応',c:'#94a3b8',bg:'#1e293b',i:'○'},
  {v:'電話中',c:'#fbbf24',bg:'#2d1f00',i:'📞'},
  {v:'不在',c:'#818cf8',bg:'#1e1b4b',i:'🔔'},
  {v:'折り返し待',c:'#38bdf8',bg:'#0c2330',i:'↩'},
  {v:'アポ取得',c:'#4ade80',bg:'#052e16',i:'✅'},
  {v:'お断り',c:'#f87171',bg:'#2d0a0a',i:'✕'},
  {v:'検討中',c:'#fb923c',bg:'#2d1200',i:'💭'},
];
const DEFAULT_CR=['不在','担当者不在','折り返し約束','アポ取得','お断り','検討中','再架電'];
const COLORS=['#94a3b8','#fbbf24','#818cf8','#38bdf8','#4ade80','#f87171','#fb923c','#a78bfa','#f472b6','#34d399','#fcd34d','#67e8f9'];

function updateSyncIndicator(status,msg){
  const el=document.getElementById('sync-ind');
  if(status==='ok'){el.textContent='同期済';el.style.background='#052e16';el.style.color='#4ade80';}
  else if(status==='error'){el.textContent='未同期';el.style.background='#2d0a0a';el.style.color='#f87171';}
  else if(status==='syncing'){el.textContent='同期中...';el.style.background='#0c2330';el.style.color='#38bdf8';}
  else{el.textContent='';el.style.background='transparent';}
}

function utf8ToBase64(str){
  const bytes=new TextEncoder().encode(str);
  let binary='';
  for(let i=0;i<bytes.length;i++)binary+=String.fromCharCode(bytes[i]);
  return btoa(binary);
}
function base64ToUtf8(b64){
  const binary=atob(b64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

async function ghRead(){
  const token=getToken();
  const headers={};
  if(token)headers['Authorization']='token '+token;
  headers['Accept']='application/vnd.github.v3+json';
  try{
    const res=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`,{headers});
    if(!res.ok)return null;
    const data=await res.json();
    ghSha=data.sha;
    return JSON.parse(base64ToUtf8(data.content));
  }catch{return null;}
}

async function ghWrite(data){
  const token=getToken();
  if(!token)return false;
  try{
    // Get current SHA
    const headers={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'};
    const getRes=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`,{headers});
    let sha=null;
    if(getRes.ok){const existing=await getRes.json();sha=existing.sha;}

    const body={message:'sync data',content:utf8ToBase64(JSON.stringify(data,null,2))};
    if(sha)body.sha=sha;

    const putRes=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`,{
      method:'PUT',headers:{...headers,'Content-Type':'application/json'},body:JSON.stringify(body)
    });
    if(putRes.ok){
      const result=await putRes.json();
      ghSha=result.content.sha;
      return true;
    }
    return false;
  }catch{return false;}
}

function mergeData(local,remote){
  // Smart merge: for each entry, keep the one with more call history or more recent update
  const localMap=new Map(local.map(c=>[c.id,c]));
  const remoteMap=new Map(remote.map(c=>[c.id,c]));
  const allIds=new Set([...localMap.keys(),...remoteMap.keys()]);
  const merged=[];
  allIds.forEach(id=>{
    const l=localMap.get(id);
    const r=remoteMap.get(id);
    if(!l){merged.push(r);return;}
    if(!r){merged.push(l);return;}
    // Both exist: keep the one with more call history, or more recent updatedAt
    const lHist=(l.callHistory||[]).length;
    const rHist=(r.callHistory||[]).length;
    if(lHist!==rHist){merged.push(lHist>rHist?l:r);return;}
    const lTime=new Date(l.updatedAt||l.createdAt||0).getTime();
    const rTime=new Date(r.updatedAt||r.createdAt||0).getTime();
    merged.push(lTime>=rTime?l:r);
  });
  return merged;
}

async function syncFromGitHub(){
  showLoading(true);
  updateSyncIndicator('syncing');
  const remote=await ghRead();
  if(remote&&Array.isArray(remote)){
    cos=mergeData(cos,remote);
    saveLocal();
    rAll();
    // Push merged result back
    if(getToken())await ghWrite(cos);
    updateSyncIndicator('ok');
    showLoading(false);
    return true;
  }else{
    if(cos.length>0&&getToken()){
      const ok=await ghWrite(cos);
      updateSyncIndicator(ok?'ok':'error');
    }else{
      updateSyncIndicator(getToken()?'ok':'');
    }
    showLoading(false);
    return false;
  }
}

async function syncToGitHub(){
  if(!getToken()||isSaving)return;
  isSaving=true;
  updateSyncIndicator('syncing');
  const ok=await ghWrite(cos);
  updateSyncIndicator(ok?'ok':'error');
  isSaving=false;
  return ok;
}

// Save: local immediately + GitHub sync immediately (await)
async function save(){
  saveLocal();
  updateSyncIndicator('syncing');
  await syncToGitHub();
}

async function manualSync(){
  const ok=await syncFromGitHub();
  if(ok){
    document.getElementById('sync-status').textContent='同期完了 ('+cos.length+'件)';
    document.getElementById('sync-status').style.color='#4ade80';
  }else if(cos.length>0&&getToken()){
    await syncToGitHub();
    document.getElementById('sync-status').textContent='アップロード完了 ('+cos.length+'件)';
    document.getElementById('sync-status').style.color='#4ade80';
  }else{
    document.getElementById('sync-status').textContent='同期するデータがありません';
    document.getElementById('sync-status').style.color='#f87171';
  }
  rAll();
}

function handleCSV(inp){
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const txt=e.target.result;
    const lines=txt.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){alert('データがありません');return;}
    const sp=l=>{const res=[];let cur='',q=false;for(const ch of l){if(ch==='"'){q=!q;}else if(ch===','&&!q){res.push(cur.trim());cur='';}else cur+=ch;}res.push(cur.trim());return res;};
    const hd=sp(lines[0]);const map={};
    hd.forEach((h,i)=>{const hl=h.toLowerCase();for(const[f,ps]of Object.entries(FM))if(map[f]===undefined&&ps.some(p=>hl.includes(p.toLowerCase())))map[f]=i;});
    const allRows=lines.slice(1).map(l=>{const cols=sp(l);const c=nc();for(const[f,i]of Object.entries(map))if(i!==undefined&&cols[i])c[f]=cols[i];return c;}).filter(c=>c.companyName);
    if(!allRows.length){alert('会社名列が見つかりませんでした');return;}
    const normPhone=p=>(p||'').replace(/[\s\-\u3000\uff0d（）()]/g,'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
    const isFree=p=>/^(0120|0800|0570)/.test(p);
    const noPhone=[];const freeDial=[];const lst=[];
    allRows.forEach(c=>{
      const np=normPhone(c.phone);
      if(!np){noPhone.push(c.companyName);return;}
      if(isFree(np)){freeDial.push(c.companyName+' ('+c.phone+')');return;}
      c.phone=np.replace(/^(0\d{1,4})(\d{1,4})(\d{4})$/,'$1-$2-$3');
      lst.push(c);
    });
    cos=[...cos,...lst];save();rAll();
    let msg=''+lst.length+'件インポートしました';
    if(noPhone.length)msg+='\n\n電話番号なし（除外: '+noPhone.length+'件）';
    if(freeDial.length)msg+='\n\nフリーダイヤル（除外: '+freeDial.length+'件）';
    alert(msg);
  };
  r.readAsText(file,'UTF-8');inp.value='';
}

function addSL(){
  const inp=document.getElementById('new-sl');
  const v=inp.value.trim();
  if(!v){return;}
  if(SL.some(s=>s.v===v)){alert('既に存在します');return;}
  const ci=SL.length%COLORS.length;
  SL.push({v:v,c:COLORS[ci],bg:BGS[ci],i:'●'});
  saveSL();renderCfgSL();inp.value='';
}
function removeSL(i){
  if(!confirm('「'+SL[i].v+'」を削除しますか？'))return;
  SL.splice(i,1);saveSL();renderCfgSL();
}

function openM(id){
  document.getElementById(id).classList.add('open');
  if(id==='sm'){document.getElementById('gh-token').value=getToken();document.getElementById('sync-status').textContent='';renderCfgCR();renderCfgSL();}
}
function closeM(id){document.getElementById(id).classList.remove('open');}
function bgClick(e,id){if(e.target===e.currentTarget)closeM(id);}
function toggleF(){const f=document.getElementById('filters');const b=document.getElementById('ftb');const o=f.classList.toggle('open');b.classList.toggle('active',o);}
window.addEventListener('resize',()=>{if(window.innerWidth>=768){document.getElementById('list-panel').style.display='';document.getElementById('detail-panel').style.display='';}});

// --- Init ---
// Auto-detect token from URL hash: ...html#token=gho_xxx
(function(){
  const hash=window.location.hash;
  if(hash.includes('token=')){
    const t=hash.split('token=')[1];
    if(t){localStorage.setItem(GH_TOKEN_KEY,t);window.location.hash='';}
  }
})();

// Phone input: only allow digits and hyphens
document.getElementById('fp').addEventListener('input',function(){
  this.value=this.value.replace(/[^0-9\-]/g,'');
});

cos=loadLocal();rAll();
// Auto-sync on load
syncFromGitHub().then(()=>rAll());

// Save to GitHub when app is about to close/hide (iOS Safari)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'){
    saveLocal();
    if(getToken()){
      // Use sendBeacon as last resort for quick sync signal, plus try fetch
      syncToGitHub();
    }
  }
});
window.addEventListener('pagehide',()=>{saveLocal();});

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
