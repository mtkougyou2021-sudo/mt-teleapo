<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MTテレアポ"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>MT興業 テレアポ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#070e1a;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo',sans-serif;color:#e2e8f0;overflow:hidden;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;color:#e2e8f0;background:#0a1628;border:1.5px solid #1a3a6a;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;width:100%;box-sizing:border-box;}
select option{background:#0f172a;}
textarea{resize:vertical;}
input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(0.7);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#0a1628;}
::-webkit-scrollbar-thumb{background:#1a3a6a;border-radius:2px;}

#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
#main{flex:1;display:flex;overflow:hidden;}
#list-panel{display:flex;flex-direction:column;width:100%;overflow:hidden;background:#070e1a;}
#detail-panel{display:none;flex-direction:column;flex:1;overflow:hidden;background:#070e1a;}

@media(min-width:768px){
  #list-panel{width:420px;flex-shrink:0;border-right:1px solid #0f2040;}
  #detail-panel{display:flex;}
  #back-btn{display:none!important;}
}

.panel-header{background:#0a1628;padding:14px 16px 12px;border-bottom:2px solid #1a3a6a;flex-shrink:0;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.logo{font-size:20px;font-weight:900;letter-spacing:0.08em;color:#e2e8f0;}
.logo span{color:#f97316;}
.logo small{color:#64748b;font-size:12px;font-weight:400;margin-left:8px;}
.header-btns{display:flex;gap:8px;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-card{background:#0f1f3a;border-radius:8px;padding:7px 6px;text-align:center;}
.stat-num{font-size:20px;font-weight:900;line-height:1;}
.stat-label{color:#334155;font-size:10px;margin-top:2px;}
.search-wrap{position:relative;}
.filter-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:#1a3a6a;border:none;border-radius:5px;padding:4px 9px;color:#fff;font-size:10px;}
.filter-toggle.active{background:#1d4ed8;}
.filters{display:none;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.filters.open{display:grid;}
.filters select{padding:8px 10px;font-size:12px;}

#list-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.list-empty{text-align:center;padding:50px 24px;color:#334155;}
.list-empty .ei{font-size:44px;margin-bottom:10px;}
.list-empty p{color:#475569;font-size:14px;}
.list-empty small{color:#1e3a5f;font-size:12px;margin-top:6px;display:block;}
.li{background:#0a1628;border-bottom:1px solid #0f2040;border-left:4px solid transparent;padding:12px 16px;cursor:pointer;transition:background 0.1s;}
.li:hover{background:#0d1a2e;}
.li.active{background:#0f1f3a;}
.li-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.li-name{font-size:15px;font-weight:700;color:#e2e8f0;flex:1;padding-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.li-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
.li-meta span{font-size:11px;color:#475569;}
.li-meta .ind{color:#3b82f6;}
.li-appt{color:#f59e0b;font-size:11px;background:#2d1f00;border-radius:4px;padding:3px 8px;display:inline-block;margin-bottom:4px;}
.li-hist{color:#334155;font-size:10px;}
.list-footer{padding:5px 14px;background:#0a1628;border-top:1px solid #0f2040;color:#334155;font-size:10px;text-align:center;flex-shrink:0;}

.badge{border-radius:5px;padding:2px 7px;font-size:10px;font-weight:800;white-space:nowrap;border-width:1.5px;border-style:solid;}
.badge.big{padding:5px 12px;font-size:12px;}

.detail-header{background:#0a1628;border-bottom:2px solid #1a3a6a;padding:14px 18px;flex-shrink:0;}
.d-name{font-size:17px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:6px;}
.d-top-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.d-btns{display:flex;gap:8px;flex-shrink:0;}
.call-btn{width:100%;border:none;border-radius:12px;padding:16px;font-size:17px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;letter-spacing:0.04em;background:linear-gradient(135deg,#15803d,#22c55e);color:#fff;box-shadow:0 4px 20px #22c55e45;}
@media(max-width:767px){.call-btn{padding:18px;font-size:18px;}}
.log-btn{width:100%;margin-top:8px;background:#0f2040;color:#38bdf8;border:1.5px solid #1a4a7a;border-radius:10px;padding:11px;font-size:13px;font-weight:700;}
.tabs{display:flex;background:#0a1628;border-bottom:1px solid #0f2040;flex-shrink:0;}
.tab-btn{flex:1;padding:13px 8px;background:transparent;color:#475569;border:none;border-bottom:2px solid transparent;font-size:13px;font-weight:700;}
.tab-btn.active{background:#0f2040;color:#60a5fa;border-bottom-color:#3b82f6;}
.tab-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.info-grid{display:grid;grid-template-columns:1fr;gap:10px;}
@media(min-width:768px){.info-grid{grid-template-columns:1fr 1fr;}}
.ic{background:#0a1628;border:1px solid #0f2040;border-radius:10px;padding:12px 14px;}
.ic.full{grid-column:1/-1;}
.ic-label{color:#334155;font-size:10px;letter-spacing:0.07em;margin-bottom:4px;}
.ic-val{font-size:14px;font-weight:600;}
.ic-val.empty{color:#1e3a5f;font-weight:400;}
.hc{background:#0a1628;border:1px solid #0f2040;border-radius:10px;padding:12px 16px;margin-bottom:10px;}
.hc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.hc-date{color:#334155;font-size:12px;}
.hc-result{color:#fbbf24;font-size:12px;font-weight:700;}
.d-ph{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.d-ph .phi{font-size:48px;}
.d-ph p{color:#334155;font-size:15px;}

.modal-ov{display:none;position:fixed;inset:0;background:#000000bb;z-index:200;flex-direction:column;justify-content:flex-end;align-items:stretch;}
.modal-ov.open{display:flex;}
@media(min-width:768px){.modal-ov{justify-content:center;align-items:center;} .modal-box{border-radius:14px!important;width:540px!important;max-width:90vw;} .modal-handle{display:none!important;}}
.modal-box{background:#0f172a;border:1px solid #1a3a6a;border-radius:20px 20px 0 0;padding:24px 20px 36px;max-height:92vh;overflow-y:auto;width:100%;box-sizing:border-box;}
.modal-handle{width:40px;height:4px;background:#1e3a5f;border-radius:2px;margin:0 auto 18px;}
.modal-title{color:#e2e8f0;font-size:15px;font-weight:700;margin-bottom:16px;}
.fg{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:768px){.fg{grid-template-columns:1fr 1fr;}}
.ff{display:flex;flex-direction:column;gap:6px;}
.ff.full{grid-column:1/-1;}
.fl{color:#475569;font-size:11px;letter-spacing:0.07em;}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.rb{background:#0f2040;color:#94a3b8;border:1.5px solid #1a3a6a;border-radius:10px;padding:12px 8px;font-size:13px;font-weight:700;min-height:46px;}
.rb.sel{background:#1d4ed8;color:#fff;border-color:#3b82f6;}
.sg{display:flex;flex-wrap:wrap;gap:6px;}
.sb{background:#0f2040;color:#475569;border:1.5px solid #1a3a6a;border-radius:8px;padding:9px 12px;font-size:12px;font-weight:700;min-height:38px;}
.ma{display:flex;gap:10px;margin-top:18px;}

.btn{border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;}
.btn-p{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;}
.btn-s{background:linear-gradient(135deg,#15803d,#22c55e);color:#fff;}
.btn-csv{background:#1d4ed8;color:#fff;padding:8px 14px;font-size:13px;border:none;border-radius:8px;font-weight:700;}
.btn-add{background:#15803d;color:#fff;padding:8px 14px;font-size:13px;border:none;border-radius:8px;font-weight:700;}
.btn-2{background:#1e293b;color:#94a3b8;border:1px solid #334155;}
.btn-e{background:#1e293b;color:#94a3b8;border:1px solid #334155;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;}
.btn-d{background:#2d0a0a;color:#f87171;border:1px solid #7f1d1d;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;}
.btn-back{background:#0f2040;color:#94a3b8;border:1px solid #1a3a6a;padding:8px 14px;font-size:13px;border-radius:8px;font-weight:700;margin-bottom:12px;}
.btn-full{width:100%;padding:13px;font-size:14px;}
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div id="list-panel">
      <div class="panel-header">
        <div class="header-top">
          <div class="logo"><span>MT</span>興業<small>テレアポ</small></div>
          <div class="header-btns">
            <button class="btn-csv" onclick="document.getElementById('csv-input').click()">📥 CSV</button>
            <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="handleCSV(this)"/>
            <button class="btn-add" onclick="openAdd()">＋ 追加</button>
          </div>
        </div>
        <div class="stats">
          <div class="stat-card"><div class="stat-num" id="st" style="color:#94a3b8">0</div><div class="stat-label">総件数</div></div>
          <div class="stat-card"><div class="stat-num" id="sa" style="color:#4ade80">0</div><div class="stat-label">アポ取得</div></div>
          <div class="stat-card"><div class="stat-num" id="sb2" style="color:#38bdf8">0</div><div class="stat-label">折り返し</div></div>
        </div>
        <div class="search-wrap">
          <input type="text" id="qi" placeholder="🔍 会社名 / 住所で検索..." oninput="renderList()" style="padding-right:60px;font-size:13px;"/>
          <button class="filter-toggle" id="ftb" onclick="toggleF()">絞込 ▾</button>
        </div>
        <div class="filters" id="filters">
          <select id="fs" onchange="renderList()">
            <option value="">全ステータス</option>
            <option>未対応</option><option>電話中</option><option>不在</option>
            <option>折り返し待</option><option>アポ取得</option><option>お断り</option><option>検討中</option>
          </select>
          <select id="fi" onchange="renderList()">
            <option value="">全業種</option>
            <option>外壁塗装</option><option>工務店</option><option>建設業</option>
            <option>ゼネコン</option><option>リフォーム</option><option>設計事務所</option><option>不動産</option><option>その他</option>
          </select>
        </div>
      </div>
      <div id="list-body"></div>
      <div class="list-footer" id="lf">0 / 0 件</div>
    </div>

    <div id="detail-panel">
      <div class="d-ph" id="dph"><div class="phi">📋</div><p>左のリストから業者を選んでください</p></div>
      <div id="dc" style="display:none;flex-direction:column;height:100%;overflow:hidden;">
        <div class="detail-header">
          <button class="btn-back" id="back-btn" onclick="closeDetail()">← 一覧に戻る</button>
          <div class="d-top-row">
            <div style="flex:1;min-width:0;padding-right:12px;">
              <div class="d-name" id="dn"></div>
              <div id="db"></div>
            </div>
            <div class="d-btns">
              <button class="btn-e" onclick="openEdit()">✏️ 編集</button>
              <button class="btn-d" onclick="delSel()">🗑 削除</button>
            </div>
          </div>
          <button class="call-btn" onclick="doCall()">
            <span style="font-size:22px">📞</span>
            <span>電話をかける</span>
            <span id="dpd" style="font-size:13px;opacity:0.8"></span>
          </button>
          <button class="log-btn" onclick="openLog()">📝 架電結果を記録する</button>
        </div>
        <div class="tabs">
          <button class="tab-btn active" id="tb0" onclick="swTab(0)">📋 案件情報</button>
          <button class="tab-btn" id="tb1" onclick="swTab(1)">📞 履歴</button>
        </div>
        <div class="tab-body" id="t0"></div>
        <div class="tab-body" id="t1" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal-ov" id="fm" onclick="bgClick(event,'fm')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="fmt">＋ 新規業者を追加</div>
    <div class="fg">
      <div class="ff full"><label class="fl">会社名 *</label><input type="text" id="fc"/></div>
      <div class="ff full"><label class="fl">住所</label><input type="text" id="fa"/></div>
      <div class="ff"><label class="fl">電話番号</label><input type="tel" id="fp"/></div>
      <div class="ff"><label class="fl">担当者名</label><input type="text" id="fct"/></div>
      <div class="ff"><label class="fl">役職</label><input type="text" id="ftl"/></div>
      <div class="ff">
        <label class="fl">業種</label>
        <select id="fin">
          <option value="">選択してください</option>
          <option>外壁塗装</option><option>工務店</option><option>建設業</option>
          <option>ゼネコン</option><option>リフォーム</option><option>設計事務所</option><option>不動産</option><option>その他</option>
        </select>
      </div>
      <div class="ff full"><label class="fl">次回アポ</label><input type="datetime-local" id="fap"/></div>
      <div class="ff full"><label class="fl">メモ・備考</label><textarea rows="3" id="fmo"></textarea></div>
    </div>
    <div class="ma">
      <button class="btn btn-s btn-full" onclick="saveForm()">保存する</button>
      <button class="btn btn-2" onclick="closeM('fm')" style="padding:13px 18px">キャンセル</button>
    </div>
  </div>
</div>

<!-- LOG MODAL -->
<div class="modal-ov" id="lm" onclick="bgClick(event,'lm')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="lmt">📞 架電記録</div>
    <div style="margin-bottom:14px">
      <div class="fl" style="margin-bottom:8px">架電結果 *</div>
      <div class="rg" id="rb"></div>
    </div>
    <div style="margin-bottom:12px">
      <div class="fl" style="margin-bottom:8px">ステータス更新</div>
      <div class="sg" id="sbg"></div>
    </div>
    <div style="margin-bottom:12px"><label class="fl">次回アポ日時</label><input type="datetime-local" id="lap"/></div>
    <div style="margin-bottom:18px"><label class="fl">メモ（任意）</label><textarea rows="3" id="lno" placeholder="担当者の反応など..."></textarea></div>
    <div class="ma">
      <button class="btn btn-p btn-full" onclick="saveLog()">保存する</button>
      <button class="btn btn-2" onclick="closeM('lm')" style="padding:13px 18px">キャンセル</button>
    </div>
  </div>
</div>

<script>
const SK='mt-teleapo-v5';
const SL=[
  {v:'未対応',c:'#94a3b8',bg:'#1e293b',i:'○'},
  {v:'電話中',c:'#fbbf24',bg:'#2d1f00',i:'📞'},
  {v:'不在',c:'#818cf8',bg:'#1e1b4b',i:'🔔'},
  {v:'折り返し待',c:'#38bdf8',bg:'#0c2330',i:'↩'},
  {v:'アポ取得',c:'#4ade80',bg:'#052e16',i:'✅'},
  {v:'お断り',c:'#f87171',bg:'#2d0a0a',i:'✕'},
  {v:'検討中',c:'#fb923c',bg:'#2d1200',i:'💭'},
];
const CR=['不在','担当者不在','折り返し約束','アポ取得','お断り','検討中','再架電'];
const FM={companyName:['会社名','会社','company','企業名','業者名'],address:['住所','address','所在地'],industry:['業種','業態','industry'],phone:['電話','tel','phone','電話番号'],contactName:['担当者','担当','contact','氏名','名前'],contactTitle:['役職','肩書','title'],memo:['備考','メモ','note','memo']};

let cos=[],selId=null,fMode='add',lRes='',lStat='';

const nc=()=>({id:`${Date.now()}-${Math.random()}`,companyName:'',address:'',industry:'',phone:'',contactName:'',contactTitle:'',memo:'',status:'未対応',nextAppointment:'',callHistory:[],createdAt:new Date().toISOString()});
const load=()=>{try{const d=localStorage.getItem(SK);return d?JSON.parse(d):[];}catch{return[];}};
const save=()=>{try{localStorage.setItem(SK,JSON.stringify(cos));}catch{}};
const getSel=()=>cos.find(c=>c.id===selId)||null;
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fdt=s=>{if(!s)return'';try{return new Date(s).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return s;}};
const fdtf=s=>{if(!s)return'';try{return new Date(s).toLocaleString('ja-JP',{year:'numeric',month:'narrow',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return s;}};

function badge(v,big){
  const s=SL.find(x=>x.v===v)||SL[0];
  return `<span class="badge${big?' big':''}" style="color:${s.c};background:${s.bg};border-color:${s.c}55">${s.i} ${v}</span>`;
}

function handleCSV(inp){
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const txt=e.target.result;
    const lines=txt.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){alert('データがありません');return;}
    const sp=l=>{const res=[];let cur='',q=false;for(const ch of l){if(ch==='"'){q=!q;}else if(ch===','&&!q){res.push(cur.trim());cur='';}else cur+=ch;}res.push(cur.trim());return res;};
    const hd=sp(lines[0]);const map={};
    hd.forEach((h,i)=>{const hl=h.toLowerCase();for(const[f,ps]of Object.entries(FM))if(map[f]===undefined&&ps.some(p=>hl.includes(p.toLowerCase())))map[f]=i;});
    const allRows=lines.slice(1).map(l=>{const cols=sp(l);const c=nc();for(const[f,i]of Object.entries(map))if(i!==undefined&&cols[i])c[f]=cols[i];return c;}).filter(c=>c.companyName);
    if(!allRows.length){alert('会社名列が見つかりませんでした');return;}
    const normPhone=p=>(p||'').replace(/[\s\-\u3000\uff0d（）()]/g,'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
    const isFree=p=>/^(0120|0800|0570)/.test(p);
    const noPhone=[];const freeDial=[];const lst=[];
    allRows.forEach(c=>{
      const np=normPhone(c.phone);
      if(!np){noPhone.push(c.companyName);return;}
      if(isFree(np)){freeDial.push(c.companyName+' ('+c.phone+')');return;}
      c.phone=np.replace(/^(0\d{1,4})(\d{1,4})(\d{4})$/,'$1-$2-$3');
      lst.push(c);
    });
    cos=[...cos,...lst];save();rAll();
    let msg='✅ '+lst.length+'件インポートしました';
    if(noPhone.length)msg+='\n\n⚠ 電話番号なし（除外: '+noPhone.length+'件）:\n'+noPhone.slice(0,10).join('\n')+(noPhone.length>10?'\n…他'+(noPhone.length-10)+'件':'');
    if(freeDial.length)msg+='\n\n⚠ フリーダイヤル（除外: '+freeDial.length+'件）:\n'+freeDial.slice(0,10).join('\n')+(freeDial.length>10?'\n…他'+(freeDial.length-10)+'件':'')+'\n\n※ フリーダイヤルの企業は通常の電話番号を調べて手動で追加してください';
    alert(msg);
  };
  r.readAsText(file,'UTF-8');inp.value='';
}

function rAll(){
  document.getElementById('st').textContent=cos.length;
  document.getElementById('sa').textContent=cos.filter(c=>c.status==='アポ取得').length;
  document.getElementById('sb2').textContent=cos.filter(c=>c.status==='折り返し待').length;
  renderList();
  if(selId)renderDetail();
}

function renderList(){
  const q=document.getElementById('qi').value.toLowerCase();
  const fs=document.getElementById('fs').value;
  const fi=document.getElementById('fi').value;
  const f=cos.filter(c=>(!q||c.companyName.toLowerCase().includes(q)||(c.address||'').toLowerCase().includes(q))&&(!fs||c.status===fs)&&(!fi||c.industry===fi));
  document.getElementById('lf').textContent=f.length+' / '+cos.length+' 件';
  const bd=document.getElementById('list-body');
  if(!f.length){
    bd.innerHTML=cos.length?'<div class="list-empty"><p>条件に一致する業者がいません</p></div>':'<div class="list-empty"><div class="ei">📋</div><p>まだリストがありません</p><small>「📥 CSV」からインポートまたは「＋ 追加」から登録</small></div>';
    return;
  }
  bd.innerHTML=f.map(c=>{
    const s=SL.find(x=>x.v===c.status)||SL[0];
    const isSel=c.id===selId;
    const meta=[c.address?`<span>📍 ${esc(c.address)}</span>`:'',c.industry?`<span class="ind">🏗 ${esc(c.industry)}</span>`:'',c.contactName?`<span>👤 ${esc(c.contactName)}</span>`:''].filter(Boolean).join('');
    return `<div class="li${isSel?' active':''}" style="border-left-color:${isSel?s.c:s.c+'55'}" onclick="selCo('${c.id}')">
      <div class="li-top"><div class="li-name">${esc(c.companyName)}</div>${badge(c.status,false)}</div>
      ${meta?`<div class="li-meta">${meta}</div>`:''}
      ${c.nextAppointment?`<div class="li-appt">📅 ${fdt(c.nextAppointment)}</div>`:''}
      ${c.callHistory?.length?`<div class="li-hist">架電 ${c.callHistory.length}回 · 最終: ${c.callHistory[0]?.result}</div>`:''}
    </div>`;
  }).join('');
}

function renderDetail(){
  const c=getSel();
  document.getElementById('dph').style.display='none';
  const dc=document.getElementById('dc');
  if(!c){dc.style.display='none';document.getElementById('dph').style.display='flex';return;}
  dc.style.display='flex';
  document.getElementById('dn').textContent=c.companyName;
  document.getElementById('db').innerHTML=badge(c.status,true);
  document.getElementById('dpd').textContent=c.phone||'';
  // info tab
  const rows=[{l:'住所',v:c.address,i:'📍',full:true},{l:'業種',v:c.industry,i:'🏗'},{l:'電話番号',v:c.phone,i:'📱'},{l:'担当者名',v:c.contactName,i:'👤'},{l:'役職',v:c.contactTitle,i:'💼'},{l:'次回アポ',v:c.nextAppointment?fdtf(c.nextAppointment):null,i:'📅'}];
  let h='<div class="info-grid">';
  rows.forEach(r=>h+=`<div class="ic${r.full?' full':''}"><div class="ic-label">${r.l}</div><div class="ic-val${r.v?'':' empty'}">${r.v?r.i+' '+esc(r.v):'—'}</div></div>`);
  if(c.memo)h+=`<div class="ic full"><div class="ic-label">メモ</div><div style="color:#94a3b8;font-size:13px;white-space:pre-wrap;line-height:1.7">${esc(c.memo)}</div></div>`;
  h+='</div>';
  document.getElementById('t0').innerHTML=h;
  // history tab
  document.getElementById('tb1').textContent=`📞 履歴 (${c.callHistory?.length||0}件)`;
  document.getElementById('t1').innerHTML=!c.callHistory?.length?'<div style="text-align:center;padding:40px;color:#334155;"><div style="font-size:32px;margin-bottom:8px">📞</div>まだ架電記録がありません</div>':c.callHistory.map(lg=>`<div class="hc"><div class="hc-top"><span class="hc-date">${lg.date}</span><span class="hc-result">${lg.result}</span></div>${lg.note?`<div style="color:#94a3b8;font-size:13px;line-height:1.6">${esc(lg.note)}</div>`:''}${lg.nextDate?`<div style="color:#f59e0b;font-size:12px;margin-top:6px">📅 次回: ${fdt(lg.nextDate)}</div>`:''}</div>`).join('');
}

function selCo(id){
  selId=id;renderList();renderDetail();
  if(window.innerWidth<768){document.getElementById('list-panel').style.display='none';document.getElementById('detail-panel').style.display='flex';}
}
function closeDetail(){
  document.getElementById('list-panel').style.display='';
  document.getElementById('detail-panel').style.display='';
  selId=null;renderList();
}
function delSel(){if(!confirm('この業者を削除しますか？'))return;cos=cos.filter(c=>c.id!==selId);selId=null;save();closeDetail();rAll();}
function doCall(){const c=getSel();if(!c||!c.phone){alert('電話番号が登録されていません');return;}window.location.href='tel:'+c.phone.replace(/[-\s]/g,'');setTimeout(()=>openLog(),800);}
function swTab(n){
  [0,1].forEach(i=>{document.getElementById('tb'+i).classList.toggle('active',i===n);document.getElementById('t'+i).style.display=i===n?'block':'none';});
}

function openAdd(){fMode='add';document.getElementById('fmt').textContent='＋ 新規業者を追加';['fc','fa','fp','fct','ftl','fmo','fap'].forEach(id=>document.getElementById(id).value='');document.getElementById('fin').value='';openM('fm');}
function openEdit(){const c=getSel();if(!c)return;fMode='edit';document.getElementById('fmt').textContent='✏️ 情報を編集';document.getElementById('fc').value=c.companyName||'';document.getElementById('fa').value=c.address||'';document.getElementById('fp').value=c.phone||'';document.getElementById('fct').value=c.contactName||'';document.getElementById('ftl').value=c.contactTitle||'';document.getElementById('fin').value=c.industry||'';document.getElementById('fap').value=c.nextAppointment||'';document.getElementById('fmo').value=c.memo||'';openM('fm');}
function saveForm(){
  const name=document.getElementById('fc').value.trim();if(!name){alert('会社名は必須です');return;}
  if(fMode==='add'){const c=nc();c.companyName=name;c.address=document.getElementById('fa').value;c.phone=document.getElementById('fp').value;c.contactName=document.getElementById('fct').value;c.contactTitle=document.getElementById('ftl').value;c.industry=document.getElementById('fin').value;c.nextAppointment=document.getElementById('fap').value;c.memo=document.getElementById('fmo').value;cos.push(c);selId=c.id;}
  else{const c=getSel();if(!c)return;c.companyName=name;c.address=document.getElementById('fa').value;c.phone=document.getElementById('fp').value;c.contactName=document.getElementById('fct').value;c.contactTitle=document.getElementById('ftl').value;c.industry=document.getElementById('fin').value;c.nextAppointment=document.getElementById('fap').value;c.memo=document.getElementById('fmo').value;}
  save();closeM('fm');rAll();renderDetail();
}

function openLog(){
  const c=getSel();if(!c)return;
  lRes='';lStat=c.status;
  document.getElementById('lmt').textContent='📞 架電記録 — '+c.companyName;
  document.getElementById('lap').value=c.nextAppointment||'';
  document.getElementById('lno').value='';
  document.getElementById('rb').innerHTML=CR.map(r=>`<button class="rb" id="rb${r}" onclick="selRes('${r}')">${r}</button>`).join('');
  document.getElementById('sbg').innerHTML=SL.map(s=>`<button class="sb" id="sb${s.v}" onclick="selStat('${s.v}')" style="background:${lStat===s.v?s.bg:'#0f2040'};color:${lStat===s.v?s.c:'#475569'};border-color:${lStat===s.v?s.c:'#1a3a6a'}">${s.v}</button>`).join('');
  openM('lm');
}
function selRes(r){lRes=r;CR.forEach(x=>{const b=document.getElementById('rb'+x);if(b)b.className='rb'+(x===r?' sel':'');});}
function selStat(v){lStat=v;SL.forEach(s=>{const b=document.getElementById('sb'+s.v);if(b){b.style.background=s.v===v?s.bg:'#0f2040';b.style.color=s.v===v?s.c:'#475569';b.style.borderColor=s.v===v?s.c:'#1a3a6a';}});}
function saveLog(){
  if(!lRes){alert('架電結果を選んでください');return;}
  const c=getSel();if(!c)return;
  const log={id:Date.now(),date:new Date().toLocaleString('ja-JP'),result:lRes,note:document.getElementById('lno').value,nextDate:document.getElementById('lap').value};
  c.callHistory=[log,...(c.callHistory||[])];c.status=lStat;c.nextAppointment=document.getElementById('lap').value||c.nextAppointment;
  save();closeM('lm');rAll();renderDetail();
}

function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
function bgClick(e,id){if(e.target===e.currentTarget)closeM(id);}
function toggleF(){const f=document.getElementById('filters');const b=document.getElementById('ftb');const o=f.classList.toggle('open');b.classList.toggle('active',o);}
window.addEventListener('resize',()=>{if(window.innerWidth>=768){document.getElementById('list-panel').style.display='';document.getElementById('detail-panel').style.display='';}});

cos=load();rAll();

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
